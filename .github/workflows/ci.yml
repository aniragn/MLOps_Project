name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: pytest api/tests/test_unit.py -v

      - name: Run integration test (Docker)
        run: |
          docker compose up -d
          sleep 20
          pytest api/tests/test_integration.py -v
          docker compose down

  build-push:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        run: |
          IMAGE=ghcr.io/${{ github.repository }}/waste-api
          docker build -t $IMAGE:latest ./api
          docker push $IMAGE:latest
          echo "IMAGE=$IMAGE:latest" >> $GITHUB_ENV

      - name: Verify image is pullable
        run: docker pull ghcr.io/${{ github.repository }}/waste-api:latest