name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install -r requirements.txt
      - name: Unit tests
        run: pytest api/tests/test_unit.py -v
      - name: Integration test (Docker)
        run: |
          docker compose up -d
          sleep 15
          pytest api/tests/test_integration.py -v
          docker compose down

  build-push:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - run: |
          docker build -t ghcr.io/${{ github.repository }}/waste-api:latest ./api
          docker push ghcr.io/${{ github.repository }}/waste-api:latest